# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    # DB-backed sessions in the existing `sessions` table (parity with the old
    # app; survives redeploys and works across multiple web nodes). The table
    # is excluded from Doctrine schema tools via doctrine.yaml schema_filter and
    # managed directly by PdoSessionHandler (see config/services.yaml).
    session:
        handler_id: Symfony\Component\HttpFoundation\Session\Storage\Handler\PdoSessionHandler

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
