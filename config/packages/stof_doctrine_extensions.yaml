# Read the documentation: https://symfony.com/doc/current/bundles/StofDoctrineExtensionsBundle/index.html
# See the official DoctrineExtensions documentation for more details: https://github.com/doctrine-extensions/DoctrineExtensions/tree/main/doc
#
# The old app enabled timestampable/blameable/loggable/softdeleteable, but only
# timestampable (Unit.createdAt/updatedAt) and softdeleteable (Unit.deletedAt) were actually
# used by any entity — only those are enabled here (docs/port-inventory/entities.md §0.2).
stof_doctrine_extensions:
    default_locale: en_US
    orm:
        default:
            timestampable: true
            softdeleteable: true
