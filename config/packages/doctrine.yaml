doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        server_version: 'mariadb-10.5.29'

        # Legacy DBAL types for the read-only mitr_sus schema (see docs/port-inventory/entities.md):
        #  - array: PHP-serialized "(DC2Type:array)" Users.roles column (type removed in DBAL 4)
        #  - year:  MySQL/MariaDB YEAR column units.foundation_date
        types:
            array: App\Doctrine\Types\LegacyArrayType
            year: App\Doctrine\Types\YearType
        mapping_types:
            year: year

        # Ignore legacy tables that must never be touched (Symfony 2.8 ACL, unused Gedmo
        # helper tables, PDO session storage) so schema tools do not propose dropping them.
        schema_filter: '~^(?!acl_|ext_|sessions$)~'

        profiling_collect_backtrace: '%kernel.debug%'
        use_savepoints: true
    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        report_fields_where_declared: true
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App
        controller_resolver:
            auto_mapping: false
        # Same behavior as the old app: soft-deleted Units are hidden everywhere by default.
        filters:
            softdeleteable:
                class: Gedmo\SoftDeleteable\Filter\SoftDeleteableFilter
                enabled: true

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
