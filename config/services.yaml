# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # static user→role/permission table (old SUS/UserBundle/Resources/config/roles.yml, verbatim)
    sus.roles_file: '%kernel.project_dir%/config/sus_roles.yaml'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # --- Security area (CAS SSO) ------------------------------------------------------------

    App\Security\PhpCasClient:
        arguments:
            $casHost: '%env(CAS_HOST)%'
            $casPort: '%env(int:CAS_PORT)%'
            $casUri: '%env(CAS_URI)%'
            $serviceBaseUrl: '%env(CAS_SERVICE_BASE_URL)%'
            $insecureSkipVerify: '%env(bool:CAS_INSECURE_SKIP_VERIFY)%'

    App\Security\RolesRegistry:
        arguments:
            $rolesFile: '%sus.roles_file%'

    # old service id `security.user.permissions` (LDAP lookup of official school accounts)
    App\Security\UserPermissions:
        arguments:
            $host: '%env(SYNC_LDAP_HOST)%'
            $port: '%env(int:SYNC_LDAP_PORT)%'
            $bindDn: '%env(SYNC_LDAP_DN)%'
            $bindPassword: '%env(SYNC_LDAP_PASSWORD)%'

    # DB-backed session handler. The existing `sessions` table already uses
    # PdoSessionHandler's default columns (sess_id/sess_data/sess_time/
    # sess_lifetime), so no column mapping is needed. The table already exists;
    # never call ->createTable(). Reuses the app DATABASE_URL connection.
    Symfony\Component\HttpFoundation\Session\Storage\Handler\PdoSessionHandler:
        arguments:
            - '%env(DATABASE_URL)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
