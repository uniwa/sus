controllers:
    resource:
        path: ../src/Controller/
        namespace: App\Controller
    type: attribute

# Public landing page at / (old route `homeredirts`, FrameworkBundle:Template:template
# rendering SUSSiteBundle::landing.html.twig — same generic controller in Symfony 7).
homeredirts:
    path: /
    controller: Symfony\Bundle\FrameworkBundle\Controller\TemplateController
    defaults:
        template: landing.html.twig

# /admin/ 301-redirect (old route `adminredirts`) lives in config/routes/admin_redirect.yaml
# so it loads BEFORE Sonata's own /admin/ route — see the comment there.

# NOTE on /login, /logout, /login_check: the old routing.yml declared three bare
# controller-less placeholder routes for the BeSimple SSO firewall. In this port the same
# three names/paths are attribute routes on App\Controller\SecurityController (redirect to
# CAS / firewall-intercepted logout; templates link to `logout` by name in user_block and
# error403). Do NOT re-declare them here — a YAML route with the same name, loaded after the
# `controllers` import above, silently replaces the attribute route with a controller-less
# one and turns /login into a 500.
